# Default values for litellm.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/berriai/litellm-database
  pullPolicy: Always
  tag: "main-stable"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  name: litellm-svc
  type: ClusterIP
  port: 4000

ingress:
  enabled: true
  className: public
  name: litellm-ingress
  annotations:
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-allow-headers: >-
      DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Accept
    nginx.ingress.kubernetes.io/cors-allow-methods: GET, POST, PUT, DELETE, PATCH, OPTIONS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    cert-manager.io/cluster-issuer: "letsencrypt"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts: []
  tls: []

container:
  env:
    - name: STORE_MODEL_IN_DB
      value: "True"
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: litellm-credentials
          key: DATABASE_URL
    - name: FOUNDRY_API_BASE
      valueFrom:
        secretKeyRef:
          name: litellm-credentials
          key: FOUNDRY_API_BASE
    - name: FOUNDRY_API_KEY
      valueFrom:
        secretKeyRef:
          name: litellm-credentials
          key: FOUNDRY_API_KEY
    - name: LITELLM_MASTER_KEY
      valueFrom:
        secretKeyRef:
          name: litellm-credentials
          key: LITELLM_MASTER_KEY
    - name: UI_USERNAME
      value: "admin"
    - name: UI_PASSWORD
      value: "Maplab@2024"

resources: {}

startupProbe:
  httpGet:
    path: /health/liveliness
    port: 4000
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

livenessProbe:
  httpGet:
    path: /health/liveliness
    port: 4000
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/readiness
    port: 4000
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 10
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

volumes:
  - name: litellm-config
    configMap:
      name: litellm-config

volumeMounts:
  - name: litellm-config
    mountPath: /app/config.yml
    subPath: config.yml

nodeSelector: {}

tolerations: []

affinity: {}
