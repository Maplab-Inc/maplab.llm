<div class="create-vehicle-container">
    <div class="form-container card">
        <div class="form-content">

            <maplab-chat-form-field-wrapper [label]="'Name'">
                <input type="text" pInputText [(ngModel)]="newTrunk.name" />
            </maplab-chat-form-field-wrapper>

            <maplab-chat-form-field-wrapper [label]="'Number'">
                <p-inputNumber [(ngModel)]="newTrunk.number" [disabled]="true">
                </p-inputNumber>
            </maplab-chat-form-field-wrapper>

            <maplab-chat-form-field-wrapper [label]="'longitude'">
                <p-inputNumber [(ngModel)]="newTrunk.longitude" [maxFractionDigits]="8" mode="decimal"
                    (ngModelChange)="coordinateChange()">
                </p-inputNumber>
            </maplab-chat-form-field-wrapper>

            <maplab-chat-form-field-wrapper [label]="'latitude'">
                <p-inputNumber [(ngModel)]="newTrunk.latitude" [maxFractionDigits]="8" mode="decimal"
                    (ngModelChange)="coordinateChange()">
                </p-inputNumber>
            </maplab-chat-form-field-wrapper>
            <div class="flex">
                <p-menu #menu id="config_menu" [model]="items" [popup]="true" />
                <p-button icon="pi pi-plus" 
                (click)="newTrunk.compartments.length< 3 ? menu.toggle($event):''"
                    label="Add Compartment" [text]="true" pTooltip="Maximum 3" tooltipPosition="top" />
            </div>
            <ng-container *ngFor="let item of newTrunk.compartments; let index = index">

                <maplab-chat-panel-child
                    [title]="'Compartment '+(index+1) + ' (' +newTrunk.compartments[index].product.name+')'">

                    <button pTemplateIcons class="p-panel-header-icon p-link mr-2" (click)="removeCompartment(index)">
                        <span class="pi pi-trash"></span>
                    </button>

                    <maplab-chat-form-field-wrapper [label]="'Capacity'">
                        <p-inputNumber [(ngModel)]="newTrunk.compartments[index].capacity" [maxFractionDigits]="8"
                            mode="decimal">
                        </p-inputNumber>
                    </maplab-chat-form-field-wrapper>

                    <maplab-chat-form-field-wrapper [label]="'Load'">
                        <p-inputNumber [(ngModel)]="newTrunk.compartments[index].load" [maxFractionDigits]="8"
                            mode="decimal">
                        </p-inputNumber>
                    </maplab-chat-form-field-wrapper>
                </maplab-chat-panel-child>
            </ng-container>
        </div>
        <div class="form-footer">

            <button pButton pRipple
                [disabled]="loading || !(newTrunk.longitude && newTrunk.latitude && newTrunk.name) || !newTrunk.compartments.length "
                severity="contrast" 
                class="p-button-outlined"
                (click)="onCreate()">
                Add
                <i class="pi pi-spin pi-spinner ml-1" *ngIf="loading"></i>
            </button>

            <button pButton pRipple
                [disabled]="loading || !(newTrunk.longitude && newTrunk.latitude && newTrunk.name)|| !newTrunk.compartments.length"
                severity="contrast" 
                class="p-button-outlined"
                (click)="onCreate(true)">
                Save
                <i class="pi pi-spin pi-spinner ml-1" *ngIf="loading"></i>
            </button>
        </div>
    </div>
    <div class="card map-view">
        <maplab-chat-maps [height]="'75vh'" [markersFromTo]="markerFromTo" [cursorPointer]="true"
            (mapClick)="onMapClick($event)" />
    </div>
</div>
<p-toast />
