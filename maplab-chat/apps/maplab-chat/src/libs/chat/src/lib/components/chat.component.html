<div class="chat-container">
    <div class="chat-area" [style.width.%]="chatWidth">
        <div class="message-area">
            <div *ngFor="let message of messages" class="chat-message"
                [ngClass]="{'user-message': message.sender === 'user', 'ai-message': message.sender === 'ai'}">
                <div class="message-wrapper">
                    <div *ngIf="message.sender === 'ai'" class="icon-container">
                        <img src="/maplab-logo.png" alt="Maplab Logo" class="ai-icon" />
                    </div>
                    <div class="message-content">{{ message.content }}</div>
                </div>
            </div>
        </div>
        <div class="chat-prompt">
            <div class="input-container">
                <input [(ngModel)]="userInput" [disabled]="(chatFacade.chatLoading$ | async) ?? false" (keyup.enter)="sendMessage()"
                    placeholder="Type your message..." />
                <button (click)="sendMessage()" class="send-button" [disabled]="(chatFacade.chatLoading$ | async) ?? false">
                    <div class="icon-circle">
                        <i class="pi pi-arrow-up"></i>
                    </div>
                </button>
            </div>
        </div>
    </div>
    <div class="resizer"></div>
    <div class="map-area" [style.width.%]="mapWidth" #mapContainer></div>
</div>
