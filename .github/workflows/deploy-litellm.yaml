name: Deploy LiteLLM

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deployment-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  deploy-litellm:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure via federated auth
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_SP_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_SP_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      - name: Get AKS credentials
        run: az aks get-credentials --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} --name ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Helm upgrade litellm
        run: |
          helm upgrade --install litellm ./k8s/litellm \
            -f ./k8s/litellm/values.yaml \
            -f ./k8s/litellm/values-prod.yaml \
            --namespace apps

      - name: Rollout restart
        run: kubectl rollout restart deployment/litellm-deployment -n apps

      - name: Wait for rollout
        run: kubectl rollout status deployment/litellm-deployment -n apps --timeout=120s
